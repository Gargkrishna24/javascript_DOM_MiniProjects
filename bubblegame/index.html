<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble-Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <div id="panel">
        <div id="panel-top">
          <div class="element">
            <h3>Hit</h3>
            <div id="hitting" class="box">5</div>
          </div>
          <div class="element">
            <h3>Score</h3>
            <div id="increaseScore" class="box">00</div>
          </div>
          <div class="element">
            <h3>Timer</h3>
            <div id="timeInterval" class="box">60</div>
          </div>
        </div>
        <div id="panel-bottom">
        </div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
